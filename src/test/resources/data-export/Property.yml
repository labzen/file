# $schema: https://labzen-schema.oss-cn-beijing.aliyuncs.com/file-export/labzen-file-export-data-schema.json
filename: property
title: ${property-title}
exporing-header-style:
  background: "#e4e6e8"
  font:
    family: "Arial"
    size: 11
    color: "#d0204a"
    bold: true
    italic: true
  wrapped: false
exporting-column-style:
  align: CENTER
columns:
  name:
    header: "${basic-info}:-:${prop-name}"
    exporting:
      width: 18
      when-null: "${unnamed}"
      prefix: "【"
      suffix: "】"
      style:
        align: LEFT
        font:
          family: "simkai"
          color: "#3552d4"
  indexical:
    header: "${basic-info}:-:${index}"
    exporting:
      width: 10
      when-null: "0"
      prefix: "No."
      style:
        align: RIGHT
  value:
    header: "${basic-info}:-:${prop-value}"
    mapping:
      "debug=true": "${debug-on}"
      "debug=false": "${debug-off}"
      "INFO": "${info-level}"
    exporting:
      width: 22
      when-null: "${no-value}"
      when-blank: "${blank-value}"
      style:
        align: CENTER
  status:
    header: "${status-info}:-:${status}"
    mapping:
      "1": "${enabled}"
      "2": "${disabled}"
      "3": "${pending}"
    exporting:
      width: 10
      when-null: "${unknown}"
  category:
    header: "${status-info}:-:${category}"
    mapping:
      "A": "${system}"
      "B": "${business}"
      "C": "${other}"
    exporting:
      width: 10
      when-null: "${uncategorized}"
  phone:
    header: "${contact-info}:-:${phone-number}"
    exporting:
      width: 16
      converter: desensitize("(\\d{3})\\d{4}(\\d{4})", "$1****$2");
  email:
    header: "${contact-info}:-:${email-addr}"
    exporting:
      width: 22
      converter: desensitize("(^.{2})(.*)(@.*)$", "$1****$3");
  description:
    header: "${desc}"
    exporting:
      width: 25
      when-null: "${no-desc}"
      converter: truncate(20);
  size:
    header: "数值:-:大小"
    pattern:
      number: "#,##0.00"
    exporting:
      width: 12
      when-null: "0"
      suffix: " MB"
  amount:
    header: "数值:-:金额"
    pattern:
      number: "#,##0.00"
    exporting:
      width: 14
      when-null: "0.00"
      prefix: "￥"
  createTime:
    header: "时间:-:创建时间"
    pattern:
      date: "yyyy-MM-dd HH:mm:ss"
    exporting:
      width: 18
  effectiveDate:
    header: "时间:-:生效日期"
    pattern:
      date: "yyyy-MM-dd"
    exporting:
      width: 14
  lastModified:
    header: "时间:-:最后修改"
    pattern:
      date: "yyyy/MM/dd HH:mm"
    exporting:
      width: 18
  remindTime:
    header: "时间:-:提醒时间"
    pattern:
      date: "HH:mm"
    exporting:
      width: 12

# $schema: https://labzen-schema.oss-cn-beijing.aliyuncs.com/file-export/labzen-file-export-data-schema.json
filename: property
domain: cn.labzen.file.bean.Property
title: ${property-title}
exporing-header-style:
  background: "#e4e6e8"
  font:
    family: "Arial"
    size: 11
    color: "#d0204a"
    bold: true
    italic: true
  wrapped: false
exporting-column-style:
  align: CENTER
columns:
  name:
    header: "${basic-info}:-:${prop-name}"
    exporting:
      width: 18
      when-null: "${unnamed}"
      prefix: "【"
      suffix: "】"
      style:
        align: LEFT
        font:
          family: "simkai"
          color: "#3552d4"
    importing:
      require: true
  indexical:
    header: "${basic-info}:-:${index}"
    exporting:
      width: 10
      when-null: "0"
      prefix: "No."
      style:
        align: RIGHT
    importing:
      max: "1000"
  value:
    header: "${basic-info}:-:${prop-value}"
    mapping:
      "debug=true": "${debug-on}"
      "debug=false": "${debug-off}"
      "INFO": "${info-level}"
    exporting:
      width: 22
      when-null: "${no-value}"
      when-blank: "${blank-value}"
      style:
        align: CENTER
    importing:
      require: true
  status:
    header: "${status-info}:-:${status}"
    mapping:
      "1": "${enabled}"
      "2": "${disabled}"
      "3": "${pending}"
    exporting:
      width: 10
      when-null: "${unknown}"
    importing:
      depends-on: [ "indexical" ]
  category:
    header: "${status-info}:-:${category}"
    mapping:
      "A": "${system}"
      "B": "${business}"
      "C": "${other}"
    exporting:
      width: 10
      when-null: "${uncategorized}"
  phone:
    header: "${contact-info}:-:${phone-number}"
    exporting:
      width: 16
      converter: desensitize("(\\d{3})\\d{4}(\\d{4})", "$1****$2");
  email:
    header: "${contact-info}:-:${email-addr}"
    exporting:
      width: 22
      converter: desensitize("(^.{2})(.*)(@.*)$", "$1****$3");
  description:
    header: "${desc}"
    exporting:
      width: 25
      when-null: "${no-desc}"
      converter: truncate(20);
  size:
    header: "数值:-:大小"
    pattern-number: "#,##0.00"
    exporting:
      width: 12
      when-null: "0"
      suffix: " MB"
    importing:
      min: "66.6"
  amount:
    header: "数值:-:金额"
    pattern-number: "#,##0.00"
    exporting:
      width: 14
      when-null: "0.00"
      prefix: "￥"
    importing:
      max: "666666.66"
      min: "-66.66"
  createTime:
    header: "时间:-:创建时间"
    pattern-date: "yyyy-MM-dd HH:mm:ss"
    exporting:
      width: 18
    importing:
      max: "2025-12-31 23:59:59"
      min: "2025-01-01 00:00:00"
  effectiveDate:
    header: "时间:-:生效日期"
    pattern-date: "yyyy-MM-dd"
    exporting:
      width: 14
    importing:
      max: "2024-12-31"
      min: "2024-01-01"
  lastModified:
    header: "时间:-:最后修改"
    pattern-date: "yyyy/MM/dd HH:mm"
    exporting:
      width: 18
    importing:
      max: "2026/12/31 23:59"
  remindTime:
    header: "时间:-:提醒时间"
    pattern-date: "HH:mm"
    exporting:
      width: 12
    importing:
      max: "17:59"
      min: "09:00"

# $schema: ../schema/def-global-schema.json
width: 100
exporting-header-style:
  align: CENTER
  background: "#000000"
  font:
    family: "Arial"
    size: 13
    color: "#ffffff"
    bold: true
    italic: false
  border:
    color: "#d0204a"
    width: MEDIUM
  wrapped: false
exporting-column-style:
  align: RIGHT
  background: "#ffffff"
  font:
    size: 12
  wrapped: true
exporting:
  when-null: "-"
  when-blank: "-"
importing:
  cleansing: [ "trim", "strip-html" ]
